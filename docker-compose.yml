version: "3.9"

services:
  cvr:
    build: .
    container_name: cvr-name-coder
    ports:
      - "3000:3000"
    volumes:
      - cvr-data:/app/.opencode-infinite
      - cvr-config:/app/.cvr
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - CVR_ORACLE_ENABLED=${CVR_ORACLE_ENABLED:-true}
    restart: unless-stopped
    networks:
      - cvr-net

  # Optional: Web Dashboard proxy
  dashboard:
    image: nginx:alpine
    container_name: cvr-dashboard
    ports:
      - "8080:80"
    volumes:
      - ./nginx-dashboard.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - cvr-net
    depends_on:
      - cvr
    profiles:
      - dashboard

volumes:
  cvr-data:
  cvr-config:

networks:
  cvr-net:
    driver: bridge
